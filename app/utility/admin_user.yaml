apiVersion: v1
kind: ServiceAccount
metadata:
  name: blueprints-user
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blueprints-user-binding
subjects:
  - kind: ServiceAccount
    name: blueprints-user
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: cluster-blueprints
  apiGroup: rbac.authorization.k8s.io
