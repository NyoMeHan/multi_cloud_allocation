apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: 568678fghgfh
    env: Staging
    os: CentOS
    provider: gcp
    region: us-east1
  name: 568678fghgfh-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: 568678fghgfh
  template:
    metadata:
      labels:
        app: 568678fghgfh
        env: Staging
    spec:
      containers:
      - env:
        - name: CLOUD_PROVIDER
          value: gcp
        - name: CLOUD_REGION
          value: us-east1
        - name: ENVIRONMENT
          value: Staging
        - name: OS_TYPE
          value: CentOS
        - name: STORAGE_TYPE
          value: pd-standard
        image: nginx
        name: 568678fghgfh-container
        resources:
          limits:
            cpu: '6'
            memory: 11Gi
          requests:
            cpu: '6'
            memory: 11Gi
        volumeMounts:
        - mountPath: /data
          name: storage-volume
      nodeSelector:
        cloud-provider: gcp
      volumes:
      - emptyDir:
          sizeLimit: 64Gi
        name: storage-volume
